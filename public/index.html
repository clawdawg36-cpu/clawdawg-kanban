<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — Mike & ClawDawg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232736;
  --border: #2e3347;
  --text: #e4e6ef;
  --text-dim: #8b8fa7;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.25);
  --green: #00b894;
  --orange: #fdcb6e;
  --red: #e17055;
  --blue: #74b9ff;
  --radius: 12px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: auto;
}

/* Header */
header {
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(108,92,231,0.06) 0%, transparent 100%);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  border-radius: 10px;
  display: grid; place-items: center;
  font-weight: 700; font-size: 18px; color: #fff;
}

.logo h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #e4e6ef, #a29bfe);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.header-actions {
  display: flex; gap: 10px; align-items: center;
}

.filter-btn {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent);
  color: var(--text);
  background: var(--surface2);
}

.filter-btn.active {
  background: var(--accent-glow);
  color: #a29bfe;
}

.btn-add {
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 2px 12px var(--accent-glow);
}

.btn-add:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--accent-glow);
}

/* Board */
.board {
  display: flex;
  gap: 20px;
  padding: 24px 32px;
  min-height: calc(100vh - 81px);
  align-items: flex-start;
}

.column {
  flex: 1;
  min-width: 280px;
  max-width: 340px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.column-header {
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.column-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.column-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.column[data-col="backlog"] .column-dot { background: var(--text-dim); }
.column[data-col="in-progress"] .column-dot { background: var(--blue); }
.column[data-col="in-review"] .column-dot { background: var(--orange); }
.column[data-col="done"] .column-dot { background: var(--green); }

.column-count {
  font-size: 12px;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.card-list {
  padding: 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 60px;
  transition: background var(--transition);
}

.card-list.drag-over {
  background: rgba(108, 92, 231, 0.05);
}

/* Cards */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: grab;
  transition: var(--transition);
  position: relative;
}

.card:hover {
  border-color: rgba(108, 92, 231, 0.4);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transform: translateY(-1px);
}

.card.dragging {
  opacity: 0.4;
  transform: rotate(2deg);
}

.card-priority {
  position: absolute;
  top: 0; left: 16px;
  width: 28px; height: 3px;
  border-radius: 0 0 3px 3px;
}

.card-priority.low { background: var(--green); }
.card-priority.medium { background: var(--blue); }
.card-priority.high { background: var(--orange); }
.card-priority.urgent { background: var(--red); }

.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.4;
}

.card-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  background: rgba(108, 92, 231, 0.15);
  color: #a29bfe;
  font-weight: 500;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-assignee {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}

.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
}

.avatar.mike { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
.avatar.clawdawg { background: linear-gradient(135deg, #00b894, #55efc4); }

.card-date {
  font-size: 11px;
  color: var(--text-dim);
}

.card-actions {
  position: absolute;
  top: 10px; right: 10px;
  display: flex; gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
}

.card:hover .card-actions { opacity: 1; }

.card-action-btn {
  width: 24px; height: 24px;
  border: none;
  background: var(--surface);
  color: var(--text-dim);
  border-radius: 6px;
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 13px;
  transition: var(--transition);
}

.card-action-btn:hover {
  background: var(--accent);
  color: #fff;
}

.card-action-btn.delete:hover {
  background: var(--red);
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: none;
  place-items: center;
  z-index: 100;
}

.modal-overlay.open { display: grid; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 460px;
  max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: modalIn 0.25s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: none; }
}

.modal h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #e4e6ef, #a29bfe);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.field input, .field textarea, .field select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  transition: var(--transition);
  outline: none;
}

.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.field textarea { resize: vertical; min-height: 72px; }

.field-row {
  display: flex; gap: 12px;
}

.field-row .field { flex: 1; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}

.btn-cancel {
  padding: 9px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.btn-cancel:hover { background: var(--surface2); color: var(--text); }

.btn-save {
  padding: 9px 22px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.btn-save:hover {
  box-shadow: 0 4px 16px var(--accent-glow);
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">K</div>
    <h1>Kanban Board</h1>
  </div>
  <div class="header-actions">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Mike">Mike</button>
    <button class="filter-btn" data-filter="ClawDawg">ClawDawg</button>
    <button class="btn-add" onclick="openModal()">+ New Task</button>
  </div>
</header>

<div class="board">
  <div class="column" data-col="backlog">
    <div class="column-header">
      <span class="column-title"><span class="column-dot"></span>Backlog</span>
      <span class="column-count" data-count="backlog">0</span>
    </div>
    <div class="card-list" data-col="backlog"></div>
  </div>
  <div class="column" data-col="in-progress">
    <div class="column-header">
      <span class="column-title"><span class="column-dot"></span>In Progress</span>
      <span class="column-count" data-count="in-progress">0</span>
    </div>
    <div class="card-list" data-col="in-progress"></div>
  </div>
  <div class="column" data-col="in-review">
    <div class="column-header">
      <span class="column-title"><span class="column-dot"></span>In Review</span>
      <span class="column-count" data-count="in-review">0</span>
    </div>
    <div class="card-list" data-col="in-review"></div>
  </div>
  <div class="column" data-col="done">
    <div class="column-header">
      <span class="column-title"><span class="column-dot"></span>Done</span>
      <span class="column-count" data-count="done">0</span>
    </div>
    <div class="card-list" data-col="done"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">New Task</h2>
    <input type="hidden" id="taskId">
    <div class="field">
      <label>Title</label>
      <input type="text" id="fTitle" placeholder="What needs to be done?">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Add details..."></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Assignee</label>
        <select id="fAssignee">
          <option value="Mike">Mike</option>
          <option value="ClawDawg">ClawDawg</option>
        </select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="fPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Column</label>
        <select id="fColumn">
          <option value="backlog">Backlog</option>
          <option value="in-progress">In Progress</option>
          <option value="in-review">In Review</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="field">
        <label>Tags (comma-separated)</label>
        <input type="text" id="fTags" placeholder="bug, frontend">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
let tasks = [];
let activeFilter = 'all';

async function loadTasks() {
  const res = await fetch('/api/tasks');
  tasks = await res.json();
  render();
}

function render() {
  const cols = ['backlog', 'in-progress', 'in-review', 'done'];
  cols.forEach(col => {
    const list = document.querySelector(`.card-list[data-col="${col}"]`);
    const filtered = tasks.filter(t => {
      if (t.column !== col) return false;
      if (activeFilter !== 'all' && t.assignee !== activeFilter) return false;
      return true;
    });
    document.querySelector(`[data-count="${col}"]`).textContent = filtered.length;
    list.innerHTML = filtered.map(t => cardHTML(t)).join('');

    // Re-attach drag events
    list.querySelectorAll('.card').forEach(card => {
      card.addEventListener('dragstart', onDragStart);
      card.addEventListener('dragend', onDragEnd);
    });
  });
}

function cardHTML(t) {
  const date = new Date(t.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const avatarClass = t.assignee === 'Mike' ? 'mike' : 'clawdawg';
  const initials = t.assignee === 'Mike' ? 'M' : 'CD';
  const tags = (t.tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join('');
  return `<div class="card" draggable="true" data-id="${t.id}">
    <div class="card-priority ${t.priority}"></div>
    <div class="card-actions">
      <button class="card-action-btn" onclick="editTask('${t.id}')" title="Edit">&#9998;</button>
      <button class="card-action-btn delete" onclick="deleteTask('${t.id}')" title="Delete">&times;</button>
    </div>
    <div class="card-title">${esc(t.title)}</div>
    ${t.description ? `<div class="card-desc">${esc(t.description)}</div>` : ''}
    ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    <div class="card-meta">
      <span class="card-assignee"><span class="avatar ${avatarClass}">${initials}</span>${t.assignee}</span>
      <span class="card-date">${date}</span>
    </div>
  </div>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Drag and drop
let dragId = null;

function onDragStart(e) {
  dragId = e.target.dataset.id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.card-list').forEach(l => l.classList.remove('drag-over'));
  dragId = null;
}

document.querySelectorAll('.card-list').forEach(list => {
  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    list.classList.add('drag-over');
  });
  list.addEventListener('dragleave', () => list.classList.remove('drag-over'));
  list.addEventListener('drop', async e => {
    e.preventDefault();
    list.classList.remove('drag-over');
    if (!dragId) return;
    const newCol = list.dataset.col;
    await fetch(`/api/tasks/${dragId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ column: newCol }),
    });
    const task = tasks.find(t => t.id === dragId);
    if (task) task.column = newCol;
    render();
  });
});

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

// Modal
function openModal(task) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modalTitle').textContent = task ? 'Edit Task' : 'New Task';
  document.getElementById('taskId').value = task ? task.id : '';
  document.getElementById('fTitle').value = task ? task.title : '';
  document.getElementById('fDesc').value = task ? task.description : '';
  document.getElementById('fAssignee').value = task ? task.assignee : 'Mike';
  document.getElementById('fPriority').value = task ? task.priority : 'medium';
  document.getElementById('fColumn').value = task ? task.column : 'backlog';
  document.getElementById('fTags').value = task ? (task.tags || []).join(', ') : '';
  setTimeout(() => document.getElementById('fTitle').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) openModal(task);
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
  tasks = tasks.filter(t => t.id !== id);
  render();
}

async function saveTask() {
  const id = document.getElementById('taskId').value;
  const tagsRaw = document.getElementById('fTags').value;
  const data = {
    title: document.getElementById('fTitle').value.trim(),
    description: document.getElementById('fDesc').value.trim(),
    assignee: document.getElementById('fAssignee').value,
    priority: document.getElementById('fPriority').value,
    column: document.getElementById('fColumn').value,
    tags: tagsRaw ? tagsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
  };
  if (!data.title) { document.getElementById('fTitle').focus(); return; }

  if (id) {
    const res = await fetch(`/api/tasks/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const updated = await res.json();
    const idx = tasks.findIndex(t => t.id === id);
    if (idx !== -1) tasks[idx] = updated;
  } else {
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    tasks.push(await res.json());
  }
  closeModal();
  render();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

loadTasks();
</script>
</body>
</html>
