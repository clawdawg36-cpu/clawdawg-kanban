<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban — Mike & ClawDawg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232736;
  --border: #2e3347;
  --text: #e4e6ef;
  --text-dim: #8b8fa7;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.25);
  --green: #00b894;
  --orange: #fdcb6e;
  --red: #e17055;
  --blue: #74b9ff;
  --radius: 12px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: auto;
}

/* Header */
header {
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(108,92,231,0.06) 0%, transparent 100%);
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  border-radius: 10px;
  display: grid; place-items: center;
  font-weight: 700; font-size: 18px; color: #fff;
}

.logo h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, #e4e6ef, #a29bfe);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.header-actions {
  display: flex; gap: 10px; align-items: center;
}

.filter-btn {
  padding: 7px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.filter-btn:hover, .filter-btn.active {
  border-color: var(--accent);
  color: var(--text);
  background: var(--surface2);
}

.filter-btn.active {
  background: var(--accent-glow);
  color: #a29bfe;
}

.btn-add {
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 2px 12px var(--accent-glow);
}

.btn-add:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px var(--accent-glow);
}

/* Board */
.board {
  display: flex;
  gap: 20px;
  padding: 24px 32px;
  min-height: calc(100vh - 81px);
  align-items: flex-start;
}

.column {
  flex: 1;
  min-width: 280px;
  max-width: 340px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.column-header {
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.column-title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.column-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
}

.column[data-col="backlog"] .column-dot { background: var(--text-dim); }
.column[data-col="in-progress"] .column-dot { background: var(--blue); }
.column[data-col="in-review"] .column-dot { background: var(--orange); }
.column[data-col="done"] .column-dot { background: var(--green); }

.column-count {
  font-size: 12px;
  color: var(--text-dim);
  background: var(--surface2);
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 500;
}

.card-list {
  padding: 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 60px;
  transition: background var(--transition);
}

.card-list.drag-over {
  background: rgba(108, 92, 231, 0.05);
}

/* Cards */
.card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: grab;
  transition: var(--transition);
  position: relative;
}

.card:hover {
  border-color: rgba(108, 92, 231, 0.4);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  transform: translateY(-1px);
}

.card.dragging {
  opacity: 0.4;
  transform: rotate(2deg);
}

.card-priority {
  position: absolute;
  top: 0; left: 16px;
  width: 28px; height: 3px;
  border-radius: 0 0 3px 3px;
}

.card-priority.low { background: var(--green); }
.card-priority.medium { background: var(--blue); }
.card-priority.high { background: var(--orange); }
.card-priority.urgent { background: var(--red); }

.card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
  line-height: 1.4;
}

.card-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 10px;
}

.tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 6px;
  background: rgba(108, 92, 231, 0.15);
  color: #a29bfe;
  font-weight: 500;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-assignee {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
}

.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
}

.avatar.mike { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
.avatar.clawdawg { background: linear-gradient(135deg, #00b894, #55efc4); }

.card-date {
  font-size: 11px;
  color: var(--text-dim);
}

/* Due date badge */
.due-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
  margin-top: 8px;
  margin-bottom: 2px;
}

.due-badge.overdue {
  background: rgba(225, 112, 85, 0.18);
  color: var(--red);
  border: 1px solid rgba(225, 112, 85, 0.4);
  animation: pulse-overdue 2s ease-in-out infinite;
}

.due-badge.due-soon {
  background: rgba(253, 203, 110, 0.15);
  color: var(--orange);
  border: 1px solid rgba(253, 203, 110, 0.35);
}

.due-badge.on-time {
  background: rgba(0, 184, 148, 0.12);
  color: var(--green);
  border: 1px solid rgba(0, 184, 148, 0.3);
}

@keyframes pulse-overdue {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.card.overdue-card {
  border-color: rgba(225, 112, 85, 0.4);
  box-shadow: 0 0 0 1px rgba(225, 112, 85, 0.2) inset;
}

.card.overdue-card:hover {
  border-color: rgba(225, 112, 85, 0.7);
  box-shadow: 0 4px 16px rgba(225, 112, 85, 0.2);
}

/* Date input styling */
input[type="date"] {
  color-scheme: dark;
}

.card-actions {
  position: absolute;
  top: 10px; right: 10px;
  display: flex; gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
}

.card:hover .card-actions { opacity: 1; }

.card-action-btn {
  width: 24px; height: 24px;
  border: none;
  background: var(--surface);
  color: var(--text-dim);
  border-radius: 6px;
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 13px;
  transition: var(--transition);
}

.card-action-btn:hover {
  background: var(--accent);
  color: #fff;
}

.card-action-btn.delete:hover {
  background: var(--red);
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: none;
  place-items: center;
  z-index: 100;
}

.modal-overlay.open { display: grid; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  width: 520px;
  max-width: 90vw;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: modalIn 0.25s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to { opacity: 1; transform: none; }
}

.modal h2 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #e4e6ef, #a29bfe);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.field input, .field textarea, .field select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  transition: var(--transition);
  outline: none;
}

.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.field textarea { resize: vertical; min-height: 72px; }

.field-row {
  display: flex; gap: 12px;
}

.field-row .field { flex: 1; }

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}

.btn-cancel {
  padding: 9px 18px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.btn-cancel:hover { background: var(--surface2); color: var(--text); }

.btn-save {
  padding: 9px 22px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #a29bfe);
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
}

.btn-save:hover {
  box-shadow: 0 4px 16px var(--accent-glow);
}

/* Activity Section */
.activity-section {
  margin-top: 18px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}

.activity-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0;
  width: 100%;
  text-align: left;
  transition: var(--transition);
}

.activity-toggle:hover {
  color: var(--text);
}

.activity-toggle-arrow {
  margin-left: auto;
  transition: transform var(--transition);
  font-size: 10px;
}

.activity-toggle.expanded .activity-toggle-arrow {
  transform: rotate(180deg);
}

.activity-body {
  display: none;
  margin-top: 12px;
  flex-direction: column;
  gap: 10px;
}

.activity-body.open {
  display: flex;
}

.activity-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 220px;
  overflow-y: auto;
  padding-right: 4px;
}

.activity-list::-webkit-scrollbar {
  width: 4px;
}
.activity-list::-webkit-scrollbar-track { background: transparent; }
.activity-list::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 4px;
}

.activity-item {
  display: flex;
  gap: 10px;
  font-size: 12px;
  align-items: flex-start;
}

.activity-icon {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 11px;
  flex-shrink: 0;
  margin-top: 1px;
}

.activity-icon.move {
  background: rgba(116, 185, 255, 0.15);
  color: var(--blue);
}

.activity-icon.comment {
  background: rgba(108, 92, 231, 0.15);
  color: #a29bfe;
}

.activity-icon.created {
  background: rgba(0, 184, 148, 0.15);
  color: var(--green);
}

.activity-content {
  flex: 1;
  min-width: 0;
}

.activity-text {
  color: var(--text);
  line-height: 1.4;
  word-break: break-word;
}

.activity-meta {
  color: var(--text-dim);
  font-size: 11px;
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.activity-delete {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 13px;
  padding: 0 2px;
  line-height: 1;
  opacity: 0;
  transition: opacity var(--transition), color var(--transition);
  flex-shrink: 0;
}

.activity-item:hover .activity-delete {
  opacity: 1;
}

.activity-delete:hover {
  color: var(--red);
}

.activity-empty {
  color: var(--text-dim);
  font-size: 12px;
  font-style: italic;
  text-align: center;
  padding: 8px 0;
}

.comment-form {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.comment-input {
  flex: 1;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  resize: none;
  outline: none;
  min-height: 36px;
  max-height: 100px;
  transition: var(--transition);
  line-height: 1.4;
}

.comment-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.comment-author-select {
  padding: 7px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  outline: none;
  cursor: pointer;
  transition: var(--transition);
}

.comment-author-select:focus {
  border-color: var(--accent);
}

.btn-comment {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #fff;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  flex-shrink: 0;
}

.btn-comment:hover {
  background: #7c6ef7;
}

/* Notification Bell */
.notif-btn {
  position: relative;
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  display: grid; place-items: center;
  transition: var(--transition);
  flex-shrink: 0;
}

.notif-btn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--surface2);
}

.notif-badge {
  position: absolute;
  top: -4px; right: -4px;
  min-width: 18px; height: 18px;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: 9px;
  display: none;
  place-items: center;
  padding: 0 4px;
  line-height: 1;
  border: 2px solid var(--bg);
}

.notif-badge.visible { display: grid; }

.notif-dropdown {
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  width: 340px;
  max-height: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  z-index: 200;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

.notif-dropdown.open { display: flex; }

.notif-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.notif-header h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.notif-clear-btn {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.notif-clear-btn:hover {
  background: var(--surface2);
  color: var(--text);
}

.notif-list {
  overflow-y: auto;
  flex: 1;
}

.notif-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
}

.notif-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: background var(--transition);
  cursor: default;
}

.notif-item:last-child { border-bottom: none; }

.notif-item.unread {
  background: rgba(108, 92, 231, 0.04);
}

.notif-item:hover { background: var(--surface2); }

.notif-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 5px;
}

.notif-item.read .notif-dot {
  background: var(--border);
}

.notif-content { flex: 1; min-width: 0; }

.notif-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
}

.notif-text strong { font-weight: 600; }

.notif-arrow {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  margin: 0 2px;
}

.notif-arrow.from { background: rgba(139,143,167,0.15); color: var(--text-dim); }
.notif-arrow.to { background: rgba(108,92,231,0.15); color: #a29bfe; }

.notif-time {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 3px;
}

.notif-dismiss {
  width: 20px; height: 20px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  display: grid; place-items: center;
  opacity: 0;
  transition: opacity var(--transition), background var(--transition);
  flex-shrink: 0;
}

.notif-item:hover .notif-dismiss { opacity: 1; }
.notif-dismiss:hover { background: var(--surface2); color: var(--red); }

/* Bell wrapper for positioning */
.notif-wrapper {
  position: relative;
}

/* Mobile Column Nav (hidden on desktop) */
.mobile-col-nav {
  display: none;
}

/* FAB (hidden on desktop) */
.fab {
  display: none;
}

/* Mobile card move actions (hidden on desktop) */
.card-move-actions {
  display: none;
}

/* Blocked badge */
.card-blocked-banner {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 9px;
  background: rgba(225, 112, 85, 0.12);
  border: 1px solid rgba(225, 112, 85, 0.35);
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--red);
  margin-bottom: 8px;
  cursor: pointer;
  transition: var(--transition);
}

.card-blocked-banner:hover {
  background: rgba(225, 112, 85, 0.2);
}

.card-blocked-banner .lock-icon {
  font-size: 13px;
}

/* Blocked card overlay */
.card.is-blocked {
  border-color: rgba(225, 112, 85, 0.4);
}

/* Dependencies section in modal */
.dep-section {
  margin-bottom: 14px;
}

.dep-section label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.dep-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 8px;
}

.dep-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  gap: 8px;
}

.dep-item .dep-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.dep-item .dep-col-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 5px;
  background: var(--surface);
  color: var(--text-dim);
  flex-shrink: 0;
}

<script>
let tasks = [];
let dependencies = []; // [{blocker_id, blocked_id}]
let activeFilter = 'all';
let activeMobileCol = 'backlog';
const isMobile = () => window.matchMedia('(max-width: 768px)').matches;
const COL_ORDER = ['backlog', 'in-progress', 'in-review', 'done'];
const COL_LABELS = { 'backlog': 'Backlog', 'in-progress': 'In Progress', 'in-review': 'In Review', 'done': 'Done' };

// Search & filter state
let searchQuery = '';
let filterPriority = '';
let filterAssignee = '';

// --- Dependency helpers ---
function getBlockerIds(taskId) {
  return dependencies.filter(d => d.blocked_id === taskId).map(d => d.blocker_id);
}
function isBlocked(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task || task.column === 'done') return false;
  return getBlockerIds(taskId).some(bid => {
    const b = tasks.find(t => t.id === bid);
    return b && b.column !== 'done';
  });
}

async function loadTasks() {
  const [tasksRes, depsRes] = await Promise.all([
    fetch('/api/tasks'),
    fetch('/api/dependencies'),
  ]);
  tasks = await tasksRes.json();
  dependencies = await depsRes.json();
  render();
}

function matchesSearch(t) {
  const q = searchQuery.toLowerCase().trim();
  if (q) {
    const inTitle = t.title && t.title.toLowerCase().includes(q);
    const inDesc = t.description && t.description.toLowerCase().includes(q);
    const inTags = (t.tags || []).some(tag => tag.toLowerCase().includes(q));
    const inAssignee = t.assignee && t.assignee.toLowerCase().includes(q);
    if (!inTitle && !inDesc && !inTags && !inAssignee) return false;
  }
  if (filterPriority && t.priority !== filterPriority) return false;
  if (filterAssignee && t.assignee !== filterAssignee) return false;
  // header-level assignee filter
  if (activeFilter !== 'all' && t.assignee !== activeFilter) return false;
  return true;
}

function highlightText(text, query) {
  if (!query || !text) return esc(text || '');
  // Escape the text for safe HTML first, then wrap query matches
  // We escape the query to use in regex, but match against the raw text
  const q = query.trim();
  if (!q) return esc(text);
  const qEsc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(qEsc, 'gi');
  // Split text on matches, escape each piece, wrap matches
  const parts = [];
  let last = 0;
  let m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push(esc(text.slice(last, m.index)));
    parts.push(`<mark class="highlight">${esc(m[0])}</mark>`);
    last = re.lastIndex;
  }
  if (last < text.length) parts.push(esc(text.slice(last)));
  return parts.join('');
}

function render() {
  const cols = ['backlog', 'in-progress', 'in-review', 'done'];
  const q = searchQuery.toLowerCase().trim();
  let totalVisible = 0;
  cols.forEach(col => {
    const list = document.querySelector(`.card-list[data-col="${col}"]`);
    const colEl = list.closest('.column');
    const filtered = tasks.filter(t => t.column === col && matchesSearch(t));
    totalVisible += filtered.length;
    document.querySelector(`[data-count="${col}"]`).textContent = filtered.length;
    const mcountEl = document.querySelector(`[data-mcount="${col}"]`);
    if (mcountEl) mcountEl.textContent = filtered.length;
    list.innerHTML = filtered.map(t => cardHTML(t, q)).join('');

    // no-results per column
    let noRes = list.querySelector('.no-results');
    if (!noRes) {
      noRes = document.createElement('div');
      noRes.className = 'no-results';
      noRes.textContent = 'No matching cards';
      list.appendChild(noRes);
    }
    noRes.classList.toggle('visible', filtered.length === 0);

    // Mobile: show/hide columns
    if (isMobile()) {
      colEl.classList.toggle('mobile-active', col === activeMobileCol);
      list.querySelectorAll('.card').forEach(card => {
        card.setAttribute('draggable', 'false');
      });
    } else {
      colEl.classList.remove('mobile-active');
      list.querySelectorAll('.card').forEach(card => {
        card.setAttribute('draggable', 'true');
        card.addEventListener('dragstart', onDragStart);
        card.addEventListener('dragend', onDragEnd);
      });
    }
  });

  // Update results info
  const hasFilters = q || filterPriority || filterAssignee || activeFilter !== 'all';
  const infoEl = document.getElementById('searchResultsInfo');
  const resetBtn = document.getElementById('searchResetBtn');
  if (hasFilters) {
    infoEl.textContent = `${totalVisible} of ${tasks.length} cards`;
    infoEl.classList.add('active');
    resetBtn.classList.add('visible');
  } else {
    infoEl.textContent = '';
    infoEl.classList.remove('active');
    resetBtn.classList.remove('visible');
  }
}

function dueBadgeHTML(dueDate) {
  if (!dueDate) return '';
  const now = new Date();
  const due = new Date(dueDate + 'T23:59:59'); // end of due day
  const diffMs = due - now;
  const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
  const formatted = new Date(dueDate).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  if (diffMs < 0) {
    const overdueDays = Math.abs(diffDays);
    return `<div class="due-badge overdue">⚠️ Overdue by ${overdueDays}d — ${formatted}</div>`;
  } else if (diffDays <= 2) {
    return `<div class="due-badge due-soon">🔥 Due ${diffDays === 0 ? 'today' : diffDays === 1 ? 'tomorrow' : `in ${diffDays}d`} — ${formatted}</div>`;
  } else {
    return `<div class="due-badge on-time">📅 Due ${formatted}</div>`;
  }
}

function cardHTML(t, q) {
  const date = new Date(t.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const avatarClass = t.assignee === 'Mike' ? 'mike' : 'clawdawg';
  const initials = t.assignee === 'Mike' ? 'M' : 'CD';
  const tags = (t.tags || []).map(tag => `<span class="tag">${q ? highlightText(tag, q) : esc(tag)}</span>`).join('');
  const moveBtns = COL_ORDER
    .filter((c) => c !== t.column)
    .map(c => `<button class="card-move-btn" onclick="moveTask('${t.id}','${c}')">${COL_LABELS[c]}</button>`)
    .join('');

  // Determine if overdue for card border highlight
  let isOverdue = false;
  if (t.dueDate) {
    const due = new Date(t.dueDate + 'T23:59:59');
    isOverdue = due < new Date() && t.column !== 'done';
  }

  const blocked = isBlocked(t.id);
  const activeBlockerIds = getBlockerIds(t.id).filter(bid => { const b = tasks.find(x => x.id === bid); return b && b.column !== 'done'; });
  const blockedBanner = blocked
    ? `<div class="card-blocked-banner" onclick="editTask('${t.id}')" title="Click to manage blockers">
        <span class="lock-icon">🔒</span>
        Blocked by ${activeBlockerIds.length} card${activeBlockerIds.length !== 1 ? 's' : ''}
       </div>`
    : '';

  return `<div class="card${isOverdue ? ' overdue-card' : ''}${blocked ? ' is-blocked' : ''}" draggable="true" data-id="${t.id}">
    <div class="card-priority ${t.priority}"></div>
    <div class="card-actions">
      <button class="card-action-btn" onclick="editTask('${t.id}')" title="Edit">&#9998;</button>
      <button class="card-action-btn delete" onclick="deleteTask('${t.id}')" title="Delete">&times;</button>
    </div>
    <div class="card-title">${q ? highlightText(t.title, q) : esc(t.title)}</div>
    ${t.description ? `<div class="card-desc">${q ? highlightText(t.description, q) : esc(t.description)}</div>` : ''}
    ${blockedBanner}
    ${tags ? `<div class="card-tags">${tags}</div>` : ''}
    ${t.column !== 'done' && t.dueDate ? dueBadgeHTML(t.dueDate) : ''}
    <div class="card-meta">
      <span class="card-assignee"><span class="avatar ${avatarClass}">${initials}</span>${t.assignee}</span>
      <span class="card-date">${date}</span>
    </div>
    <div class="card-move-actions">${moveBtns}</div>
  </div>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Drag and drop
let dragId = null;

function onDragStart(e) {
  dragId = e.target.dataset.id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.card-list').forEach(l => l.classList.remove('drag-over'));
  dragId = null;
}

document.querySelectorAll('.card-list').forEach(list => {
  list.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    list.classList.add('drag-over');
  });
  list.addEventListener('dragleave', () => list.classList.remove('drag-over'));
  list.addEventListener('drop', async e => {
    e.preventDefault();
    list.classList.remove('drag-over');
    if (!dragId) return;
    const newCol = list.dataset.col;
    await fetch(`/api/tasks/${dragId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ column: newCol }),
    });
    const task = tasks.find(t => t.id === dragId);
    if (task) task.column = newCol;
    render();
    loadNotifications();
  });
});

// Filter (header assignee buttons)
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    // Sync assignee dropdown if applicable
    const sel = document.getElementById('filterAssignee');
    if (sel) {
      if (btn.dataset.filter === 'all') {
        sel.value = '';
        filterAssignee = '';
      } else {
        sel.value = btn.dataset.filter;
        filterAssignee = btn.dataset.filter;
      }
    }
    render();
  });
});

// Search & Filter Bar listeners
(function() {
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  const filterPriorityEl = document.getElementById('filterPriority');
  const filterAssigneeEl = document.getElementById('filterAssignee');

  if (searchInput) {
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value;
      searchClear.classList.toggle('visible', searchQuery.length > 0);
      render();
    });
  }

  if (searchClear) {
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.classList.remove('visible');
      searchInput.focus();
      render();
    });
  }

  if (filterPriorityEl) {
    filterPriorityEl.addEventListener('change', () => {
      filterPriority = filterPriorityEl.value;
      render();
    });
  }

  if (filterAssigneeEl) {
    filterAssigneeEl.addEventListener('change', () => {
      filterAssignee = filterAssigneeEl.value;
      // Sync the header buttons to 'all' if dropdown set to empty
      if (!filterAssignee) {
        activeFilter = 'all';
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.filter === 'all');
        });
      } else {
        activeFilter = 'all'; // let dropdown take over, clear header btn
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
      }
      render();
    });
  }
})();

function resetSearch() {
  searchQuery = '';
  filterPriority = '';
  filterAssignee = '';
  const si = document.getElementById('searchInput');
  if (si) si.value = '';
  const sc = document.getElementById('searchClear');
  if (sc) sc.classList.remove('visible');
  const fp = document.getElementById('filterPriority');
  if (fp) fp.value = '';
  const fa = document.getElementById('filterAssignee');
  if (fa) fa.value = '';
  activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  render();
}

// Modal
let activityOpen = false;
let currentTaskActivity = [];

function openModal(task) {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modalTitle').textContent = task ? 'Edit Task' : 'New Task';
  document.getElementById('taskId').value = task ? task.id : '';
  document.getElementById('fTitle').value = task ? task.title : '';
  document.getElementById('fDesc').value = task ? task.description : '';
  document.getElementById('fAssignee').value = task ? task.assignee : 'Mike';
  document.getElementById('fPriority').value = task ? task.priority : 'medium';
  document.getElementById('fColumn').value = task ? task.column : 'backlog';
  document.getElementById('fDueDate').value = task && task.dueDate ? task.dueDate : '';
  document.getElementById('fTags').value = task ? (task.tags || []).join(', ') : '';

  // Activity section — only for existing tasks
  const actSection = document.getElementById('activitySection');
  if (task) {
    actSection.style.display = '';
    activityOpen = false;
    document.getElementById('activityToggle').classList.remove('expanded');
    document.getElementById('activityBody').classList.remove('open');
    document.getElementById('commentInput').value = '';
    currentTaskActivity = [];
    loadActivity(task.id);
  } else {
    actSection.style.display = 'none';
  }

  setTimeout(() => document.getElementById('fTitle').focus(), 100);
}

async function loadActivity(taskId) {
  try {
    const res = await fetch(`/api/tasks/${taskId}/activity`);
    currentTaskActivity = await res.json();
    renderActivity();
  } catch(e) {
    console.error('Failed to load activity', e);
  }
}

function renderActivity() {
  const list = document.getElementById('activityList');
  if (!currentTaskActivity.length) {
    list.innerHTML = '<div class="activity-empty">No activity yet.</div>';
    return;
  }
  list.innerHTML = currentTaskActivity.map(a => {
    const icon = a.type === 'move' ? '↔' : a.type === 'created' ? '✦' : '💬';
    const time = formatRelTime(a.createdAt);
    const deleteBtn = a.type === 'comment'
      ? `<button class="activity-delete" onclick="deleteComment('${a.id}')" title="Delete">×</button>`
      : '';
    return `<div class="activity-item" data-aid="${a.id}">
      <div class="activity-icon ${esc(a.type)}">${icon}</div>
      <div class="activity-content">
        <div class="activity-text">${esc(a.content)}</div>
        <div class="activity-meta"><span>${esc(a.author)}</span><span>·</span><span>${time}</span></div>
      </div>
      ${deleteBtn}
    </div>`;
  }).join('');
  list.scrollTop = list.scrollHeight;
}

function formatRelTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 7) return `${d}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function toggleActivity() {
  activityOpen = !activityOpen;
  document.getElementById('activityToggle').classList.toggle('expanded', activityOpen);
  document.getElementById('activityBody').classList.toggle('open', activityOpen);
  if (activityOpen) {
    const list = document.getElementById('activityList');
    setTimeout(() => { list.scrollTop = list.scrollHeight; }, 50);
  }
}

async function submitComment() {
  const taskId = document.getElementById('taskId').value;
  const content = document.getElementById('commentInput').value.trim();
  const author = document.getElementById('commentAuthor').value;
  if (!content || !taskId) return;
  try {
    const res = await fetch(`/api/tasks/${taskId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, author }),
    });
    const comment = await res.json();
    currentTaskActivity.push(comment);
    renderActivity();
    document.getElementById('commentInput').value = '';
  } catch(e) {
    console.error('Failed to post comment', e);
  }
}

async function deleteComment(id) {
  if (!confirm('Delete this comment?')) return;
  try {
    await fetch(`/api/activity/${id}`, { method: 'DELETE' });
    currentTaskActivity = currentTaskActivity.filter(a => a.id !== id);
    renderActivity();
  } catch(e) {
    console.error('Failed to delete comment', e);
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) openModal(task);
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
  tasks = tasks.filter(t => t.id !== id);
  render();
}

async function saveTask() {
  const id = document.getElementById('taskId').value;
  const tagsRaw = document.getElementById('fTags').value;
  const data = {
    title: document.getElementById('fTitle').value.trim(),
    description: document.getElementById('fDesc').value.trim(),
    assignee: document.getElementById('fAssignee').value,
    priority: document.getElementById('fPriority').value,
    column: document.getElementById('fColumn').value,
    dueDate: document.getElementById('fDueDate').value || null,
    tags: tagsRaw ? tagsRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
  };
  if (!data.title) { document.getElementById('fTitle').focus(); return; }

  if (id) {
    const res = await fetch(`/api/tasks/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const updated = await res.json();
    const idx = tasks.findIndex(t => t.id === id);
    if (idx !== -1) tasks[idx] = updated;
  } else {
    const res = await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    tasks.push(await res.json());
  }
  closeModal();
  render();
  loadNotifications();
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// Mobile column nav
document.querySelectorAll('.mobile-col-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mobile-col-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeMobileCol = tab.dataset.tab;
    render();
  });
});

// Move task (mobile)
async function moveTask(id, newCol) {
  await fetch(`/api/tasks/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ column: newCol }),
  });
  const task = tasks.find(t => t.id === id);
  if (task) task.column = newCol;
  render();
}

// Re-render on resize (crossing breakpoint)
let wasMobile = isMobile();
window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  if (nowMobile !== wasMobile) {
    wasMobile = nowMobile;
    render();
  }
});

// ─── Notifications ────────────────────────────────────────────────────────────
let notifications = [];
const COL_COLORS = {
  'backlog': '#8b8fa7',
  'in-progress': '#74b9ff',
  'in-review': '#fdcb6e',
  'done': '#00b894',
};
const COL_EMOJI = {
  'backlog': '📋',
  'in-progress': '⚡',
  'in-review': '🔍',
  'done': '✅',
};

async function loadNotifications() {
  try {
    const res = await fetch('/api/notifications');
    notifications = await res.json();
    renderNotifications();
  } catch (e) { /* ignore */ }
}

function renderNotifications() {
  const unreadCount = notifications.filter(n => !n.is_read).length;
  const badge = document.getElementById('notifBadge');
  badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
  badge.classList.toggle('visible', unreadCount > 0);

  const list = document.getElementById('notifList');
  if (notifications.length === 0) {
    list.innerHTML = '<div class="notif-empty">No activity yet</div>';
    return;
  }
  list.innerHTML = notifications.map(n => {
    const timeAgo = relativeTime(n.created_at);
    const fromLabel = COL_LABELS[n.from_col] || n.from_col;
    const toLabel = COL_LABELS[n.to_col] || n.to_col;
    const fromEmoji = COL_EMOJI[n.from_col] || '';
    const toEmoji = COL_EMOJI[n.to_col] || '';
    return `<div class="notif-item ${n.is_read ? 'read' : 'unread'}" data-id="${n.id}">
      <div class="notif-dot"></div>
      <div class="notif-content">
        <div class="notif-text">
          <strong>${esc(n.task_title)}</strong> moved
          <span class="notif-arrow from">${fromEmoji} ${fromLabel}</span>→<span class="notif-arrow to">${toEmoji} ${toLabel}</span>
        </div>
        <div class="notif-time">${timeAgo} · ${n.changed_by}</div>
      </div>
      <button class="notif-dismiss" onclick="dismissNotification(${n.id}, event)" title="Dismiss">×</button>
    </div>`;
  }).join('');
}

function relativeTime(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

async function toggleNotifDropdown() {
  const dropdown = document.getElementById('notifDropdown');
  const isOpen = dropdown.classList.contains('open');
  dropdown.classList.toggle('open', !isOpen);

  if (!isOpen) {
    // Mark all as read when opening
    if (notifications.some(n => !n.is_read)) {
      await fetch('/api/notifications/read', { method: 'POST' });
      notifications = notifications.map(n => ({ ...n, is_read: 1 }));
      renderNotifications();
    }
  }
}

async function clearNotifications() {
  await fetch('/api/notifications/read', { method: 'POST' });
  notifications = notifications.map(n => ({ ...n, is_read: 1 }));
  renderNotifications();
}

async function dismissNotification(id, e) {
  e.stopPropagation();
  await fetch(`/api/notifications/${id}`, { method: 'DELETE' });
  notifications = notifications.filter(n => n.id !== id);
  renderNotifications();
}

// Close notification dropdown when clicking outside
document.addEventListener('click', e => {
  const wrapper = document.querySelector('.notif-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    document.getElementById('notifDropdown').classList.remove('open');
  }
});

// Intercept column changes to reload notifications
const _origMoveTask = moveTask;
async function moveTask(id, newCol) {
  await _origMoveTask(id, newCol);
  await loadNotifications();
}

// Poll for new notifications every 30s
setInterval(loadNotifications, 30000);

loadTasks();
loadNotifications();
</script>
